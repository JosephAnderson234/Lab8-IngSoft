<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="domain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="app" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfdbfe"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="driving" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="driven" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ddd6fe"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="broker" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fecaca"/>
      <stop offset="1" stop-color="#f87171"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#1e293b" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowEvt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1280" height="820" fill="url(#bg)"/>

  <!-- Title -->
  <text x="640" y="46" text-anchor="middle" font-size="27" font-weight="700" fill="#0f172a">Programa de Recompensas de Restaurantes</text>
  <text x="640" y="74" text-anchor="middle" font-size="16" fill="#475569">Arquitectura Hexagonal (Ports &amp; Adapters) + Arquitectura Orientada a Eventos (EDA)</text>

  <!-- ======================= DRIVING SIDE (left) ======================= -->
  <text x="150" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#047857">ADAPTADORES DE ENTRADA</text>
  <text x="150" y="140" text-anchor="middle" font-size="12.5" fill="#047857">(driving / primary)</text>

  <!-- Productor -->
  <g filter="url(#shadow)">
    <rect x="40" y="168" width="220" height="92" rx="12" fill="url(#driving)" stroke="#059669" stroke-width="1.5"/>
  </g>
  <text x="150" y="196" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">Sistema del Restaurante</text>
  <text x="150" y="218" text-anchor="middle" font-size="12.5" fill="#065f46">apps/productor_restaurante</text>
  <text x="150" y="238" text-anchor="middle" font-size="11.5" fill="#047857">registra cena → publica</text>

  <!-- Consumidor -->
  <g filter="url(#shadow)">
    <rect x="40" y="320" width="220" height="100" rx="12" fill="url(#driving)" stroke="#059669" stroke-width="1.5"/>
  </g>
  <text x="150" y="350" text-anchor="middle" font-size="15" font-weight="700" fill="#064e3b">Microservicio Recompensas</text>
  <text x="150" y="372" text-anchor="middle" font-size="12.5" fill="#065f46">apps/consumidor_recompensas</text>
  <text x="150" y="392" text-anchor="middle" font-size="11.5" fill="#047857">consume → ProcesarTransaccion</text>
  <text x="150" y="409" text-anchor="middle" font-size="11.5" fill="#047857">CenaUseCase</text>

  <!-- Broker -->
  <g filter="url(#shadow)">
    <rect x="40" y="486" width="220" height="120" rx="12" fill="url(#broker)" stroke="#dc2626" stroke-width="1.5"/>
  </g>
  <text x="150" y="514" text-anchor="middle" font-size="15" font-weight="700" fill="#7f1d1d">Broker de Mensajería</text>
  <text x="150" y="536" text-anchor="middle" font-size="12.5" fill="#991b1b">Exchange → Routes → Queue</text>
  <text x="150" y="560" text-anchor="middle" font-size="12" fill="#b91c1c">RabbitMQ · Kafka · Memoria</text>
  <text x="150" y="582" text-anchor="middle" font-size="11.5" fill="#b91c1c">desacopla productor/consumidor</text>
  <text x="150" y="599" text-anchor="middle" font-size="11" font-style="italic" fill="#b91c1c">infrastructure/messaging</text>

  <!-- ======================= HEXAGON (center) ======================= -->
  <!-- Outer hexagon = Application + Ports -->
  <g filter="url(#shadow)">
    <polygon points="640,150 870,280 870,540 640,670 410,540 410,280" fill="url(#app)" stroke="#2563eb" stroke-width="2"/>
  </g>
  <text x="640" y="186" text-anchor="middle" font-size="16" font-weight="700" fill="#1e3a8a">APPLICATION · Puertos (ABC)</text>

  <!-- Port chips top -->
  <g font-size="11.5" fill="#1e3a8a">
    <rect x="470" y="200" width="150" height="26" rx="13" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="545" y="217" text-anchor="middle">ConsumidorTransacciones</text>
    <rect x="660" y="200" width="135" height="26" rx="13" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="727" y="217" text-anchor="middle">PublicadorEventos</text>
  </g>

  <!-- Inner hexagon = Domain -->
  <polygon points="640,250 760,318 760,452 640,520 520,452 520,318" fill="url(#domain)" stroke="#d97706" stroke-width="2"/>
  <text x="640" y="300" text-anchor="middle" font-size="15" font-weight="700" fill="#7c2d12">DOMINIO</text>
  <text x="640" y="324" text-anchor="middle" font-size="12" fill="#7c2d12">TransaccionCena</text>
  <text x="640" y="343" text-anchor="middle" font-size="12" fill="#7c2d12">CuentaRecompensas</text>
  <text x="640" y="362" text-anchor="middle" font-size="12" fill="#7c2d12">CalculoRecompensa</text>
  <text x="640" y="381" text-anchor="middle" font-size="12" fill="#7c2d12">EventoNotificacion</text>
  <text x="640" y="402" text-anchor="middle" font-size="11.5" fill="#92400e">seguridad (máscara + hash)</text>
  <text x="640" y="420" text-anchor="middle" font-size="11.5" fill="#92400e">errores · reglas puras</text>

  <!-- Use case + policy labels (between hexagons, bottom) -->
  <g font-size="11.5" fill="#1e3a8a">
    <rect x="470" y="556" width="150" height="26" rx="13" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="545" y="573" text-anchor="middle">RepositorioRecompensas</text>
    <rect x="660" y="556" width="135" height="26" rx="13" fill="#eff6ff" stroke="#3b82f6"/>
    <text x="727" y="573" text-anchor="middle">PoliticaRecompensas</text>
  </g>
  <text x="640" y="624" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1e3a8a">caso_uso · politica (BRONCE/PLATA/ORO)</text>

  <!-- ======================= DRIVEN SIDE (right) ======================= -->
  <text x="1130" y="120" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">ADAPTADORES DE SALIDA</text>
  <text x="1130" y="140" text-anchor="middle" font-size="12.5" fill="#5b21b6">(driven / secondary)</text>

  <!-- Persistence -->
  <g filter="url(#shadow)">
    <rect x="1020" y="200" width="220" height="100" rx="12" fill="url(#driven)" stroke="#7c3aed" stroke-width="1.5"/>
  </g>
  <text x="1130" y="228" text-anchor="middle" font-size="15" font-weight="700" fill="#4c1d95">Persistencia</text>
  <text x="1130" y="252" text-anchor="middle" font-size="12.5" fill="#5b21b6">repositorio_sqlite</text>
  <text x="1130" y="272" text-anchor="middle" font-size="12.5" fill="#5b21b6">repositorio_memoria</text>
  <text x="1130" y="291" text-anchor="middle" font-size="11" font-style="italic" fill="#6d28d9">infrastructure/persistence</text>

  <!-- Publisher / notifications -->
  <g filter="url(#shadow)">
    <rect x="1020" y="330" width="220" height="100" rx="12" fill="url(#driven)" stroke="#7c3aed" stroke-width="1.5"/>
  </g>
  <text x="1130" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#4c1d95">Publicador de Eventos</text>
  <text x="1130" y="382" text-anchor="middle" font-size="12.5" fill="#5b21b6">RabbitMQ · Kafka · Memoria</text>
  <text x="1130" y="402" text-anchor="middle" font-size="11.5" fill="#5b21b6">EventoNotificacion (opcional)</text>
  <text x="1130" y="420" text-anchor="middle" font-size="11" font-style="italic" fill="#6d28d9">serializacion · fabrica</text>

  <!-- Composition root -->
  <g filter="url(#shadow)">
    <rect x="1020" y="486" width="220" height="78" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  </g>
  <text x="1130" y="514" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">Composition Root</text>
  <text x="1130" y="536" text-anchor="middle" font-size="12" fill="#92400e">composicion.py · config.py</text>
  <text x="1130" y="554" text-anchor="middle" font-size="11" fill="#b45309">único lugar que conoce las implementaciones</text>

  <!-- ======================= ARROWS ======================= -->
  <!-- Productor -> Broker (publish) -->
  <path d="M150,260 L150,486" fill="none" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arrowEvt)"/>
  <text x="163" y="375" font-size="11.5" font-weight="600" fill="#b91c1c" transform="rotate(90 163 375)">publish transacción</text>

  <!-- Broker -> Consumidor (consume) -->
  <path d="M150,486 C90,470 90,440 150,420" fill="none" stroke="#dc2626" stroke-width="2.4" marker-end="url(#arrowEvt)"/>
  <text x="40" y="455" font-size="11" font-weight="600" fill="#b91c1c">consume</text>

  <!-- Consumidor -> Application (drives) -->
  <path d="M260,360 L408,360" fill="none" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="334" y="350" text-anchor="middle" font-size="11.5" font-weight="600" fill="#334155">invoca caso de uso</text>

  <!-- Productor -> Application (publishes via port) - dashed to show it also uses publisher port -->
  <path d="M260,214 C330,214 360,250 408,290" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow)"/>

  <!-- Application -> Persistence -->
  <path d="M872,300 C950,270 970,255 1018,250" fill="none" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="945" y="248" text-anchor="middle" font-size="11.5" font-weight="600" fill="#334155">guarda cuenta</text>

  <!-- Application -> Publisher -->
  <path d="M872,400 C950,395 970,385 1018,380" fill="none" stroke="#475569" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="945" y="372" text-anchor="middle" font-size="11.5" font-weight="600" fill="#334155">emite notificación</text>

  <!-- Composition root wiring (dashed up into hexagon) -->
  <path d="M1020,520 C930,560 860,560 800,540" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <text x="905" y="575" text-anchor="middle" font-size="11" font-style="italic" fill="#b45309">cablea adaptadores ↔ puertos</text>

  <!-- ======================= LEGEND ======================= -->
  <g font-size="12">
    <rect x="340" y="700" width="600" height="96" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="640" y="722" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Principios de diseño evidenciados</text>

    <rect x="356" y="734" width="14" height="14" rx="3" fill="url(#domain)"/>
    <text x="376" y="745" fill="#334155">Dominio puro — alta cohesión, sin dependencias</text>
    <rect x="356" y="756" width="14" height="14" rx="3" fill="url(#app)"/>
    <text x="376" y="767" fill="#334155">Puertos (ABC) — abstracción / DIP</text>
    <rect x="356" y="778" width="14" height="14" rx="3" fill="url(#driving)"/>
    <text x="376" y="789" fill="#334155">Adaptadores de entrada — driving</text>

    <rect x="660" y="734" width="14" height="14" rx="3" fill="url(#driven)"/>
    <text x="680" y="745" fill="#334155">Adaptadores de salida — driven (intercambiables)</text>
    <rect x="660" y="756" width="14" height="14" rx="3" fill="url(#broker)"/>
    <text x="680" y="767" fill="#334155">Broker — bajo acoplamiento / escalabilidad</text>
    <rect x="660" y="778" width="14" height="14" rx="3" fill="#fff7ed" stroke="#f59e0b"/>
    <text x="680" y="789" fill="#334155">Composition root — cableado único</text>
  </g>
</svg>
